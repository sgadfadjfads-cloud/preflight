name: Validate Preflight

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Skill package
        run: python3 tests/validate_skill.py
      - name: Check whitespace
        run: git diff --check
